<!DOCTYPE html>
<html lang="en-US" xmlns:th="www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="../../static/images/favicon.ico"
      th:href="@{/images/favicon.ico}"
    />
    <link
      href="../../static/vendor/bootstrap/bootstrap.min.css"
      th:href="@{/vendor/bootstrap/bootstrap.min.css}"
      rel="stylesheet"
    />
    <link
      href="../../static/css/main.css"
      th:href="@{/css/main.css}"
      rel="stylesheet"
    />
    <!-- Font Family Nunito Sans -->
    <link
      href="../../static/css/font.css"
      th:href="@{/css/font.css}"
      rel="stylesheet"
    />

    <style>
      .body {
        height: 100vh;
      }

      .sticky-nav {
        position: sticky;
        top: 88px;
        left: 0;
      }

      .nav-link a {
        opacity: 0.55;
        margin-left: 1.23rem;
        font-size: 1.11rem;
      }

      .nav-link.active {
        a {
          color: #8854c0;
          opacity: 1;
        }
      }
      .nav-link:hover {
        a {
          opacity: 1;
        }
        .rotate-on-hover {
          animation: rotate 0.5s linear forwards;
        }
      }

      @keyframes rotate {
        0% {
          transform: rotate(0deg);
        }
        33% {
          transform: rotate(-8deg);
        }
        66% {
          transform: rotate(15deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }

      #content {
        padding: 8px;
        min-width: 488px;
        max-width: 678px;
      }

      #content .dropdown-menu {
        position: absolute;
        .filter-label,
        .sort-label {
          width: 100%;
          height: 100%;
          cursor: pointer;
        }
        .filter-label {
          margin-left: 12px;
        }
      }

      .pagination {
        gap: 3px;
        align-items: center;
      }

      .page-item .page-link {
        border: none;
        background-color: transparent;
        border-radius: 7px;
        &:hover {
          color: #8854c0;
        }
      }

      .page-item.active .page-link {
        background-color: #ac82d8;
        &:hover {
          color: #fff;
        }
      }
    </style>
  </head>

  <body class="bg-light">
    <header class="bg-light">
      <nav
        class="navbar navbar-expand-sm p-0 navbar-light bg-white"
        id="header-nav"
        role="navigation"
      >
        <div class="container-fluid mx-2">
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <a class="link-dark navbar-brand site-title mb-0" th:href="@{/home}"
              >ezQuiz</a
            >
            <div th:replace="library :: nav-search"></div>
            <ul class="navbar-nav align-items-center ms-auto">
              <li class="nav-item">
                <a
                  class="btn btn-sm bg-light mx-1 px-2 bd-left"
                  style="min-width: 111px"
                  th:href="@{/home}"
                >
                  Home&nbsp;&nbsp;<i class="fas fa-home"></i>
                </a>
              </li>
              <li class="nav-item dropdown no-arrow">
                <a
                  class="btn dropdown-toggle btn-sm px-2"
                  id="libraryDropdown"
                  role="button"
                  data-toggle="dropdown"
                  aria-haspopup="true"
                  aria-expanded="false"
                  style="
                    margin-right: 25px;
                    background-color: #8854c0;
                    color: #fff;
                  "
                >
                  Create<i class="fas fa-plus" style="margin-left: 5px"></i
                ></a>
                <!-- Library dropdown -->
                <div
                  id="libraryDropdown"
                  class="dropdown-menu bg-white shadow animated--grow-in p-0"
                  aria-labelledby="libraryDropdown"
                  style="min-width: 0; width: 100px; right: 25px"
                >
                  <a
                    class="dropdown-item btn btn-sm p-1"
                    href="quiz/quiz-editing.html"
                    th:href="@{/quiz/new}"
                  >
                    Quiz
                  </a>
                  <a
                    class="dropdown-item btn btn-sm p-1"
                    th:href="@{/classroom/created-list}"
                  >
                    Classroom
                  </a>
                </div>
              </li>
              <li class="nav-item dropdown no-arrow">
                <a
                  class="nav-link dropdown-toggle bg-light rounded-full rounded-circle"
                  id="userDropdown"
                  role="button"
                  data-toggle="dropdown"
                  aria-haspopup="true"
                  aria-expanded="false"
                  style="padding: 6px 12px"
                >
                  <i class="fas fa-bars"></i>
                </a>

                <!-- Dropdown - User Information -->
                <div
                  class="dropdown-menu dropdown-menu-right shadow animated--grow-in"
                  aria-labelledby="userDropdown"
                >
                  <a class="dropdown-item" th:href="@{/profile}">
                    <i class="fas fa-user fa-sm fa-fw mr-2 text-gray-400"></i>
                    Profile
                  </a>
                  <a class="dropdown-item" href="#">
                    <i class="fas fa-cogs fa-sm fa-fw mr-2 text-gray-400"></i>
                    Settings
                  </a>
                  <a class="dropdown-item" th:href="@{/admin/list}">
                    <i
                      class="fas fa-solid fa-sm fa-fw mr-2 fa-users text-gray-400"
                    ></i>
                    User Management
                  </a>
                  <a class="dropdown-item" href="#">
                    <i class="fas fa-list fa-sm fa-fw mr-2 text-gray-400"></i>
                    Activity Log
                  </a>
                  <div class="dropdown-divider"></div>
                  <a class="dropdown-item" th:href="@{/logout}">
                    <i
                      class="fas fa-sign-out-alt fa-sm fa-fw mr-2 text-gray-400"
                    ></i>
                    Logout
                  </a>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <div class="page-content bg-light py-3">
      <div class="container-fluid">
        <div
          th:with="max=${quizList.getTotalPages()}, 
                  content=${quizList.getContent()},
                  totalResults=${quizList.getTotalElements()}"
          class="d-flex justify-content-center m-0 w-100 h-100 gap-3 gap-lg-5"
        >
          <!-- Left Nav - Library Nav -->
          <div
            class="section d-none d-md-block sticky-nav col-lg-3"
            style="height: fit-content; min-width: 234px"
          >
            <header>
              <div><h4>Library</h4></div>
            </header>
            <ul class="nav d-flex flex-column align-items-center mb-3">
              <li class="nav-link w-100 p-0 rounded-1">
                <a class="btn btn-sm d-flex" th:href="@{/library}">
                  <div class="square-33-center-item rotate-on-hover">
                    <i class="fas fa-list"></i>
                  </div>
                  <div class="d-flex align-items-center flex-1">
                    <span>All</span>
                  </div>
                </a>
              </li>
              <li class="nav-link w-100 p-0 rounded-1 active">
                <a class="btn btn-sm d-flex" th:href="@{/quiz/created-list}">
                  <div class="square-33-center-item rotate-on-hover">
                    <i class="fas fa-graduation-cap"></i>
                  </div>
                  <div class="d-flex align-items-center flex-1">
                    <span>Quiz</span>
                  </div>
                </a>
              </li>
              <li class="nav-link w-100 p-0 rounded-1">
                <a
                  class="btn btn-sm d-flex"
                  th:href="@{/classroom/created-list}"
                >
                  <div class="square-33-center-item rotate-on-hover">
                    <i class="fas fa-book"></i>
                  </div>
                  <div class="d-flex align-items-center flex-1">
                    <span>Classroom</span>
                  </div>
                </a>
              </li>
            </ul>
            <div class="divider left-content-divider"></div>

            <div th:replace="library :: pagination-bar"></div>
          </div>

          <!-- </Left Nav> -->

          <!-- <right content> -->
          <div
            id="content"
            class="d-flex flex-column"
            style="gap: 0.456789rem; min-width: 699px"
          >
            <div class="d-flex justify-content-between">
              <div th:replace="library :: search-result"></div>
              <div class="d-flex gap-1">
                <div
                  th:if="${path.equals('/quiz/created-list')}"
                  class="navbar-nav d-flex flex-column"
                >
                  <div class="nav-item dropdown">
                    <button
                      class="btn dropdown-toggle btn-sm bg-white p-0 d-flex align-items-center px-1"
                      role="button"
                      data-toggle="dropdown"
                      aria-haspopup="true"
                      aria-expanded="false"
                    >
                      <span class="fas fa-filter"></span>
                      <div style="width: 88px">
                        <span th:if="${params.draft == null}"> All </span>
                        <span
                          th:if="${params.draft != null}"
                          th:text="${params.draft ? 'Draft' : 'Not Draft' }"
                        ></span>
                      </div>
                    </button>
                    <!-- Fitler dropdown -->
                    <div
                      id="filterDropdown"
                      class="dropdown-menu bg-white shadow animated--grow-in p-0"
                      aria-labelledby="filterDropdown"
                      style="min-width: 0; width: 140px"
                    >
                      <button
                        class="dropdown-item btn btn-sm p-0 px-3 filter-type"
                      >
                        <span>Draft</span>
                      </button>
                      <button
                        class="dropdown-item btn btn-sm p-0 px-3 filter-type"
                      >
                        <span>Not Draft</span>
                      </button>
                    </div>
                  </div>
                </div>
                <div class="navbar-nav d-flex flex-column">
                  <div class="nav-item dropdown">
                    <button
                      class="btn dropdown-toggle btn-sm bg-white p-0 px-2 d-flex align-items-center"
                      role="button"
                      data-toggle="dropdown"
                      aria-haspopup="true"
                      aria-expanded="false"
                    >
                      <span class="fas fa-sort me-2"></span>
                      <span th:if="${params.sort==null}"> Latest </span>
                      <span
                        th:unless="${params.sort==null}"
                        th:text="${params.sort}"
                        style="text-transform: capitalize"
                      ></span>
                    </button>
                    <!-- Sort dropdown -->
                    <div
                      id="sortDropdown"
                      class="dropdown-menu bg-white shadow animated--grow-in p-0"
                      aria-labelledby="sortDropdown"
                      style="min-width: 0; width: 123px"
                    >
                      <a
                        class="dropdown-item btn btn-sm p-0 sort-type text-center"
                      >
                        <span class="text-capitalize">latest</span>
                      </a>
                      <a
                        class="dropdown-item btn btn-sm p-0 sort-type text-center"
                      >
                        <span class="text-capitalize">oldest</span>
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div id="data" class="section">
              <div class="d-flex flex-column gap-2">
                <div th:each="quiz : ${quizList}">
                  <div
                    sec:authorize="hasRole('ROLE_TEACHER')"
                    class="position-relative"
                  >
                    <div class="dropdown position-absolute ellipsis-toggle">
                      <button
                        class="btn"
                        aria-expanded="false"
                        data-bs-toggle="dropdown"
                        style="right: 0"
                      >
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                      </button>
                      <ul class="dropdown-menu">
                        <li>
                          <a
                            class="dropdown-item"
                            type="button"
                            th:href="@{/quiz/{id}/edit(id=${quiz.id})}"
                          >
                            <i class="fa-regular fa-pen-to-square me-1"> </i>
                            Edit
                          </a>
                        </li>
                        <li>
                          <a
                            th:href="@{/quiz/delete/{id}(id=${quiz.id})}"
                            type="button"
                            class="dropdown-item"
                            onclick="confirm('Are you sure you want to delete this quiz?')"
                          >
                            <i class="fa-solid fa-trash me-1"> </i> Delete
                          </a>
                        </li>
                      </ul>
                    </div>
                  </div>
                  <a
                    sec:authorize="hasRole('ROLE_TEACHER')"
                    class="btn item p-1 d-flex gap-1 rounded-1"
                    style="height: 188px"
                  >
                    <img
                      th:if="${quiz.image == null}"
                      class="h-100 w-20"
                      src="https://i.etsystatic.com/24456611/r/il/e806dd/3118599492/il_600x600.3118599492_k3mm.jpg"
                    />
                    <img
                      th:unless="${quiz.image == null}"
                      class="h-100 w-20"
                      style="max-width: 169px; border: #f4f5f6 solid 1px"
                      th:src="${quiz.image}"
                    />
                    <div
                      class="bg-light d-flex flex-column align-items-start flex-fill gap-1 p-1 px-2"
                    >
                      <div class="d-flex" style="margin-top: 3px">
                        <div
                          th:if="${hasType}"
                          class="bg-white rounded-2 item-tag px-1"
                          th:text="${quiz.type}"
                        >
                          quiz
                        </div>
                        <div
                          th:if="${quiz.isDraft}"
                          class="rounded-2 item-tag px-1"
                          style="color: rgb(247, 95, 95)"
                        >
                          draft
                        </div>
                      </div>

                      <div
                        th:if="${quiz.title == null || quiz.title.isEmpty()}"
                        class="my-0 h5"
                        style="opacity: 0.48"
                      >
                        Untitled Quiz
                      </div>
                      <div
                        th:unless="${quiz.title == null || quiz.title.isEmpty()}"
                        class="my-0 h5"
                        th:text="${quiz.title}"
                      >
                        Quiz Name
                      </div>

                      <p
                        class="text-small m-0 flex-fill fw-light"
                        th:text="${quiz.description}"
                      >
                        Lorem ipsum dolor sit amet consectetur adipisicing elit.
                      </p>

                      <div
                        class="d-flex justify-content-between align-items-center w-100"
                      >
                        <div
                          class="d-flex flex-row align-items-center"
                          style="
                            font-size: 12px;
                            opacity: 0.88;
                            font-weight: 100;
                          "
                        >
                          <div class="d-flex flex-row align-items-center">
                            <i
                              class="fas fa-list h-100"
                              style="opacity: 0.55; margin-right: 3px"
                            ></i>
                            <span
                              style="margin: 0 3px"
                              th:text="${quiz.itemNumber}"
                              >99</span
                            ><span>question(s)</span>
                          </div>
                          <div class="d-flex flex-row align-items-center mx-2">
                            <i
                              class="fas fa-history h-100"
                              style="opacity: 0.55; margin-right: 3px"
                            ></i>
                            <span
                              style="margin: 0 3px"
                              th:text="${quiz.timeString}"
                              >99</span
                            >
                          </div>
                        </div>

                        <div>
                          <button class="btn btn-sm btn-primary m-0 py-0">
                            Assign
                            <i class="fas fa-caret-down"></i>
                          </button>
                        </div>
                      </div>
                    </div>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script
      src="https://kit.fontawesome.com/b16b259998.js"
      crossorigin="anonymous"
    ></script>

    <script src="../../static/js/main.js" th:src="@{/js/main.js}"></script>

    <script th:replace="~{library :: js-pagination}"></script>

    <script th:if="${path.equals('/quiz/created-list')}">
      /*<![CDATA[*/
      params.draft = /*[[${params.draft}]]*/ "";

      $(".filter-type").each(function () {
        $(this).on("click", function () {
          params.draft = $(this).find("span").text() === "Draft";
          location.href = params.getUrl();
        });
      });
      /*]]>*/
    </script>
  </body>
</html>
